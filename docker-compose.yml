services:
  dashboard:
    build: .
    container_name: stock-analysis-dashboard
    command: dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - FINMIND_TOKEN=${FINMIND_TOKEN:-}
    networks:
      - stock-network
    restart: always

  scheduler:
    build: .
    container_name: stock-analysis-scheduler
    command: schedule --daemon
    volumes:
      - ./data:/app/data
    environment:
      - FINMIND_TOKEN=${FINMIND_TOKEN:-}
    networks:
      - stock-network
    restart: always

networks:
  stock-network:
    driver: bridge
